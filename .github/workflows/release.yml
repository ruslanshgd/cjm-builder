name: Release plugin

on:
  release:
    types: [published]
  workflow_dispatch:  # Ручной запуск из Actions
    inputs:
      tag_name:
        description: 'Tag релиза (например v1.0.0)'
        required: true

permissions:
  contents: write  # Required for release uploads

jobs:
  build:
    permissions:
      contents: write  # Explicit for gh release upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Create plugin zip
        run: |
          cd plugin && zip -r ../plugin.zip . && cd ..

      - name: Upload to release
        run: gh release upload "${{ github.event.release.tag_name || github.event.inputs.tag_name }}" plugin.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
